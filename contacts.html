<!DOCTYPE html>
<html lang="tr" data-title-key="meta.titleContacts">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripek Su | İletişim</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2301A8CC' d='M12 2C12 2 5 10.5 5 15.5C5 19.09 8.13 22 12 22C15.87 22 19 19.09 19 15.5C19 10.5 12 2 12 2Z'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <div class="container topbar-inner">
    <a href="index" class="logo">
      <img src="images/ripek-logo.png" alt="Ripek" class="logo-img">
    </a>

    <nav class="nav" id="mainNav">
      <a href="about" class="nav-link" data-i18n="nav.about">About Us</a>
      <a href="products" class="nav-link" data-i18n="nav.products">Products</a>
      <a href="contacts" class="nav-link" data-i18n="nav.contacts">Contacts</a>
    </nav>

    <div class="topbar-actions">
      <div class="lang-selector">
        <button class="lang-btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="langBtnLabel">TR</span>
          <svg viewBox="0 0 12 8" fill="none" aria-hidden="true"><path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <ul class="lang-dropdown" id="langDropdown" role="listbox">
          <li role="option" data-lang="tr" data-i18n="lang.tr">Türkçe</li>
          <li role="option" data-lang="en" data-i18n="lang.en">English</li>
        </ul>
      </div>
      <button class="nav-toggle" id="navToggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="mainNav">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 6H21M3 12H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ================= CONTACT CONTENT (minimal: phone + small image only) ================= -->
<section class="contact-page">
  <div class="container">
    <p class="hero-eyebrow" data-i18n="contacts.eyebrow">BİZİ ARAYIN</p>

    <div class="contact-image">
      <div class="image-placeholder image-placeholder--round-sm">
        <span data-i18n="placeholder.contactSmallImage">[küçük görsel — 112×112]</span>
      </div>
    </div>

    <p class="contact-phone" data-i18n="contacts.phone">+90 232 000 00 00</p>
    <p class="contact-text" data-i18n="contacts.text">Siparişler, teslimat planlaması ve destek için bizi arayın</p>

    <a href="tel:+902320000000" class="btn btn-cta" data-i18n-tel data-i18n="contacts.cta">Şimdi Ara</a>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C12 2 5 10.5 5 15.5C5 19.09 8.13 22 12 22C15.87 22 19 19.09 19 15.5C19 10.5 12 2 12 2Z" fill="currentColor"/></svg>
      <span data-i18n="footer.brand">Ripek Su — 19L Damacana Üreticisi</span>
    </div>
    <span class="footer-copy">© 2026</span>
  </div>
</footer>

<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
</body>
</html>
