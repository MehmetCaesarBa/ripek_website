<style>
  :root {
    --primary-dark: #0B4F6C;
    --primary: #01798F;
    --accent-light: #6FD6E8;
    --hero-text-soft: #D6F0F5;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));

    text-align: center;
    padding: 24px;
  }
  .maintenance-box { max-width: 560px; }
  .gear {
    display: block;
    width: 54px;
    height: 54px;
    margin: 0 auto 24px;
    color: var(--accent-light);
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    margin: 0 0 12px;
  }
  p {
    font-size: 1.0625rem;
    color: var(--hero-text-soft);
    line-height: 1.6;
    margin: 0 0 28px;
  }
  .divider {
    width: 60px;
    height: 3px;
    background: var(--accent-light);
    border: none;
    border-radius: 2px;
    margin: 0 auto 28px;
    opacity: 0.6;
  }
  .en h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .en p { font-size: 0.95rem; margin: 0; }
  @media (prefers-reduced-motion: reduce) {
    .gear { animation: none; }
  }
</style>
