<svg viewBox="0 0 1440 1520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B4F6C"/>
      <stop offset="100%" stop-color="#01798F"/>
    </linearGradient>
    <path id="droplet2" d="M0,-22 C11,-6 22,9 22,20 C22,32 12,42 0,42 C-12,42 -22,32 -22,20 C-22,9 -11,-6 0,-22 Z"/>
  </defs>

  <rect width="1440" height="1520" fill="#F5F9FA"/>

  <!-- ================= TOP BAR ================= -->
  <g id="top-bar">
    <rect x="0" y="0" width="1440" height="90" fill="#FFFFFF"/>
    <line x1="0" y1="90" x2="1440" y2="90" stroke="#D7E4E8" stroke-width="1"/>
    <g id="logo" transform="translate(80,45)">
      <use href="#droplet2" fill="#01A8CC" transform="scale(0.6)"/>
      <text x="24" y="7" font-size="22" font-weight="700" fill="#0B4F6C" letter-spacing="1">AQUAPURE</text>
    </g>
    <g id="nav" font-size="16" font-weight="600" fill="#16232B">
      <text id="nav-about-us" x="620" y="50" text-anchor="middle" fill="#01A8CC">About Us</text>
      <text id="nav-products" x="760" y="50" text-anchor="middle">Products</text>
      <text id="nav-contacts" x="900" y="50" text-anchor="middle">Contacts</text>
    </g>
    <g id="lang-selector" transform="translate(1300,32)">
      <rect x="-40" y="-6" width="80" height="34" rx="17" fill="#F0F6F7" stroke="#D7E4E8"/>
      <text x="0" y="17" text-anchor="middle" font-size="14" font-weight="600" fill="#16232B">EN ▾</text>
    </g>
  </g>

  <!-- ================= HERO ================= -->
  <g id="hero">
    <rect x="0" y="90" width="1440" height="220" fill="url(#heroGrad2)"/>
    <text x="80" y="200" font-size="13" font-weight="700" fill="#6FD6E8" letter-spacing="3">SINCE 2005</text>
    <text x="80" y="250" font-size="42" font-weight="800" fill="#FFFFFF">Our Story</text>
    <text x="80" y="285" font-size="16" fill="#D6F0F5">Purity, consistency and trust — bottled since day one.</text>
  </g>
  <path d="M0,310 C360,360 1080,270 1440,310 L1440,310 L0,310 Z" fill="#F5F9FA"/>

  <!-- ================= BRIEF HISTORY (timeline) ================= -->
  <g id="section-history">
    <text x="80" y="390" font-size="13" font-weight="700" fill="#01A8CC" letter-spacing="2">OUR HISTORY</text>
    <text x="80" y="430" font-size="30" font-weight="800" fill="#16232B">Two Decades of Purity</text>
    <text x="80" y="465" font-size="15" fill="#5B6B73">A brief look at the milestones that shaped AquaPure into a trusted 19L water producer.</text>

    <line x1="140" y1="600" x2="1300" y2="600" stroke="#D7E4E8" stroke-width="3"/>
    <g id="timeline-items" font-size="14">
      <g transform="translate(220,600)">
        <use href="#droplet2" fill="#01A8CC" transform="scale(0.35) translate(0,-30)"/>
        <text text-anchor="middle" y="45" font-weight="700" fill="#16232B">2005</text>
        <text text-anchor="middle" y="66" fill="#5B6B73" font-size="12">Company founded</text>
      </g>
      <g transform="translate(560,600)">
        <use href="#droplet2" fill="#01A8CC" transform="scale(0.35) translate(0,-30)"/>
        <text text-anchor="middle" y="45" font-weight="700" fill="#16232B">2012</text>
        <text text-anchor="middle" y="66" fill="#5B6B73" font-size="12">Plant expansion</text>
      </g>
      <g transform="translate(900,600)">
        <use href="#droplet2" fill="#01A8CC" transform="scale(0.35) translate(0,-30)"/>
        <text text-anchor="middle" y="45" font-weight="700" fill="#16232B">2019</text>
        <text text-anchor="middle" y="66" fill="#5B6B73" font-size="12">ISO 9001 certified</text>
      </g>
      <g transform="translate(1220,600)">
        <use href="#droplet2" fill="#01A8CC" transform="scale(0.35) translate(0,-30)"/>
        <text text-anchor="middle" y="45" font-weight="700" fill="#16232B">2024</text>
        <text text-anchor="middle" y="66" fill="#5B6B73" font-size="12">Nationwide delivery</text>
      </g>
    </g>
    <text x="80" y="730" font-size="10" fill="#94A3B8">note: 3–5 short history paragraphs live between hero and timeline in CMS</text>
  </g>

  <!-- ================= CERTIFICATES ================= -->
  <g id="section-certificates">
    <text x="80" y="820" font-size="13" font-weight="700" fill="#01A8CC" letter-spacing="2">QUALITY ASSURANCE</text>
    <text x="80" y="860" font-size="30" font-weight="800" fill="#16232B">Certificates</text>

    <g id="cert-cards" font-size="13" font-weight="700" fill="#16232B" text-anchor="middle">
      <g transform="translate(200,970)">
        <circle r="60" fill="#FFFFFF" stroke="#D7E4E8" stroke-width="2"/>
        <circle r="40" fill="none" stroke="#01BAEF" stroke-width="3"/>
        <text y="6">ISO 9001</text>
      </g>
      <g transform="translate(450,970)">
        <circle r="60" fill="#FFFFFF" stroke="#D7E4E8" stroke-width="2"/>
        <circle r="40" fill="none" stroke="#01BAEF" stroke-width="3"/>
        <text y="6">HACCP</text>
      </g>
      <g transform="translate(700,970)">
        <circle r="60" fill="#FFFFFF" stroke="#D7E4E8" stroke-width="2"/>
        <circle r="40" fill="none" stroke="#01BAEF" stroke-width="3"/>
        <text y="6">TSE</text>
      </g>
      <g transform="translate(950,970)">
        <circle r="60" fill="#FFFFFF" stroke="#D7E4E8" stroke-width="2"/>
        <circle r="40" fill="none" stroke="#01BAEF" stroke-width="3"/>
        <text y="6">HALAL</text>
      </g>
      <g transform="translate(1200,970)">
        <circle r="60" fill="#FFFFFF" stroke="#D7E4E8" stroke-width="2"/>
        <circle r="40" fill="none" stroke="#01BAEF" stroke-width="3"/>
        <text y="-2">CE</text>
        <text y="16" font-size="10" font-weight="400" fill="#5B6B73">mark</text>
      </g>
    </g>
    <text x="80" y="1060" font-size="10" fill="#94A3B8">each badge = certificate image/logo, tappable to open PDF</text>
  </g>

  <!-- ================= REFERENCES ================= -->
  <g id="section-references">
    <text x="80" y="1160" font-size="13" font-weight="700" fill="#01A8CC" letter-spacing="2">TRUSTED BY</text>
    <text x="80" y="1200" font-size="30" font-weight="800" fill="#16232B">References &amp; Clients</text>

    <g id="reference-logos" fill="#EAF7FA" stroke="#D7E4E8">
      <rect x="80" y="1250" width="200" height="90" rx="10"/>
      <rect x="310" y="1250" width="200" height="90" rx="10"/>
      <rect x="540" y="1250" width="200" height="90" rx="10"/>
      <rect x="770" y="1250" width="200" height="90" rx="10"/>
      <rect x="1000" y="1250" width="200" height="90" rx="10"/>
      <rect x="1230" y="1250" width="130" height="90" rx="10"/>
    </g>
    <g font-size="12" fill="#5B6B73" text-anchor="middle">
      <text x="180" y="1300">[client logo]</text>
      <text x="410" y="1300">[client logo]</text>
      <text x="640" y="1300">[client logo]</text>
      <text x="870" y="1300">[client logo]</text>
      <text x="1100" y="1300">[client logo]</text>
      <text x="1295" y="1300">[+more]</text>
    </g>
  </g>

  <!-- ================= FOOTER ================= -->
  <g id="footer">
    <rect x="0" y="1460" width="1440" height="60" fill="#0B4F6C"/>
    <use href="#droplet2" fill="#6FD6E8" transform="translate(80,1490) scale(0.35)"/>
    <text x="105" y="1496" font-size="13" fill="#EAF7FA">AquaPure Water — 19L Bottle Producer</text>
    <text x="1360" y="1496" font-size="12" fill="#B7D9E2" text-anchor="end">© 2026</text>
  </g>

  <text x="1430" y="20" font-size="10" fill="#94A3B8" text-anchor="end">ABOUT US — 1440×1520</text>
</svg>
